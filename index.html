<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Anton&display=swap"
			rel="stylesheet"
		/>
		<title>NORTHLINE</title>
		<link rel="stylesheet" href="./css/index/style.min.css" />
		<style>
			.modal {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				z-index: 9999;
			}
			.modal.modal--open {
				display: flex;
			}
			.modal__overlay {
				position: absolute;
				inset: 0;
				background: rgba(0, 0, 0, 0.55);
			}
			.modal__window {
				position: relative;
				z-index: 1;
				width: min(100%, 520px);
				max-height: 90vh;
				overflow: auto;
				padding: 28px 24px 24px;
				border-radius: 20px;
				background: #fff;
				box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
			}
			.modal__close {
				position: absolute;
				top: 16px;
				right: 16px;
				border: none;
				background: transparent;
				color: #111;
				font-size: 24px;
				cursor: pointer;
			}
			.modal__body {
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.modal__img {
				width: 100%;
				border-radius: 14px;
				object-fit: cover;
			}
			.modal__brand {
				margin: 0;
				font-size: 12px;
				color: #777;
				text-transform: uppercase;
				letter-spacing: 0.2em;
			}
			.modal__title {
				margin: 0.25rem 0 0;
				font-size: 28px;
				line-height: 1.1;
				color: #111;
			}
			.modal__price {
				margin: 0.5rem 0 0;
				font-size: 18px;
				font-weight: 700;
				color: #222;
			}
			.modal__desc {
				margin: 0.75rem 0 0;
				font-size: 15px;
				line-height: 1.7;
				color: #444;
			}
		</style>
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__container">
					<span class="header__logo">NORTHLINE</span>
					<nav class="header__nav">
						<ul class="header__list">
							<li class="header__item">
								<a href="./html/fleece.html" class="header__link">Fleece</a>
							</li>
							<li class="header__item">
								<a href="./html/bottoms.html" class="header__link">Bottoms</a>
							</li>
							<li class="header__item">
								<a href="./html/accessories.html" class="header__link"
									>Accessories</a
								>
							</li>
							<li class="header__item">
								<a href="./html/footwear.html" class="header__link">Footwear</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<section class="hero">
			<section class="hero__list"></section>
		</section>

		<section id="story" class="about">
			<section class="container">
				<section class="about__wrapper">
					<div class="about__track" id="track"></div>
				</section>
				<section class="about__nav">
					<section class="about__dots" id="dots"></section>
					<div class="about__counter"></div>
					<section class="about__btns">
						<button class="about__prev" aria-label="Назад">←</button>
						<button class="about__next" aria-label="Вперёд">→</button>
					</section>
				</section>
			</section>
		</section>

		<section class="collection">
			<section class="collection__list"></section>
		</section>

		<section class="values">
			<div class="container">
				<div class="values-grid">
					<div class="reveal">
						<span class="tag">— Why Choose Us</span>
						<h2 class="section-title">
							WHY<br /><span class="accent">Northline</span>
						</h2>
						<ul class="values-list">
							<li class="value-item"></li>
						</ul>
					</div>
				</div>
			</div>
		</section>

		<footer class="footer">
			<div class="container">
				<div class="footer__container">
					<p class="footer__text">© Ron ⏤ 2026</p>
					<nav class="footer__links">
						<ul>
							<li><a href="#" class="footer__link">Linkedin</a></li>
							<li><a href="#" class="footer__link">Twitter</a></li>
							<li><a href="#" class="footer__link">Github</a></li>
							<li><a href="#" class="footer__link">Contatcs</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</footer>

		<!-- MODAL -->
		<div class="modal" id="product-modal">
			<div class="modal__overlay"></div>
			<div class="modal__window">
				<button class="modal__close">✕</button>
				<div class="modal__body"></div>
			</div>
		</div>

		<!-- SCRIPTS	 -->

		<script type="module" src="./js/index/pages/home.js"></script>
	</body>
</html>
