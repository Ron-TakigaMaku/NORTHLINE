<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<title>NORTHLINE</title>
		<link rel="stylesheet" href="./css/style.min.css" />
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__container">
					<span class="header__logo">NORTHLINE</span>
					<nav class="header__nav">
						<ul class="header__list">
							<li class="header__item">
								<a href="#" class="header__link">Jackets</a>
							</li>
							<li class="header__item">
								<a href="#" class="header__link">Hoodies</a>
							</li>
							<li class="header__item">
								<a href="#" class="header__link">Pants</a>
							</li>
							<li class="header__item">
								<a href="#" class="header__link">Footwear</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<main class="hero">
			<section class="container">
				<section class="hero__content">
					<h1 class="hero__title">Technical apparel for urban exploration</h1>
					<section class="hero-actions">
						<a href="#story" class="btn">Discover Our Story ↓</a>
					</section>
				</section>
			</section>
		</main>

		<div class="about">
			<div class="container">
				<div class="about__wrapper">
					<div class="about__track" id="track"></div>
				</div>
				<div class="about__nav">
					<div class="about__dots" id="dots"></div>
					<div class="about__btns">
						<button class="about__prev" aria-label="Назад">←</button>
						<button class="about__next" aria-label="Вперёд">→</button>
					</div>
				</div>
			</div>
		</div>

		<footer class="footer">
			<div class="container">
				<div class="footer__container">
					<p class="footer__text">© Ron ⏤ 2026</p>
					<nav class="footer__links">
						<ul>
							<li><a href="#" class="footer__link">Linkedin</a></li>
							<li><a href="#" class="footer__link">Twitter</a></li>
							<li><a href="#" class="footer__link">Github</a></li>
							<li><a href="#" class="footer__link">Contatcs</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</footer>

		<script type="module" src="./js/pages/home.js"></script>
	</body>
</html>
