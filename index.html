<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Anton&display=swap"
			rel="stylesheet"
		/>
		<title>NORTHLINE</title>
		<link rel="stylesheet" href="./scss/index/style.min.css" />
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__container">
					<span class="header__logo">NORTHLINE</span>
					<nav class="header__nav">
						<ul class="header__list">
							<li class="header__item">
								<a href="./html/fleece.html" class="header__link">Fleece</a>
							</li>
							<li class="header__item">
								<a href="./html/bottoms.html" class="header__link">Bottoms</a>
							</li>
							<li class="header__item">
								<a href="./html/accessories.html" class="header__link"
									>Accessories</a
								>
							</li>
							<li class="header__item">
								<a href="./html/footwear.html" class="header__link">Footwear</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<section class="hero reveal">
			<section class="hero__list"></section>
		</section>

		<section id="story" class="about reveal">
			<section class="container">
				<section class="about__wrapper">
					<div class="about__track" id="track"></div>
				</section>
				<section class="about__nav">
					<section class="about__dots" id="dots"></section>
					<div class="about__counter"></div>
					<section class="about__btns">
						<button class="about__prev" aria-label="Назад">←</button>
						<button class="about__next" aria-label="Вперёд">→</button>
					</section>
				</section>
			</section>
		</section>

		<section class="collection reveal">
			<section class="collection__list"></section>
		</section>

		<section class="values reveal">
			<div class="container">
				<div class="values-grid">
					<div class="reveal">
						<span class="tag">— Why Choose Us</span>
						<h2 class="section-title">
							WHY<br /><span class="accent">Northline</span>
						</h2>
						<ul class="values-list">
							<li class="value-item"></li>
						</ul>
					</div>
				</div>
			</div>
		</section>

		<footer class="footer">
			<div class="container">
				<div class="footer__container">
					<p class="footer__text">© Ron ⏤ 2026</p>
					<nav class="footer__links">
						<ul>
							<li><a href="#" class="footer__link">Linkedin</a></li>
							<li><a href="#" class="footer__link">Twitter</a></li>
							<li><a href="#" class="footer__link">Github</a></li>
							<li><a href="#" class="footer__link">Contacts</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</footer>

		<!-- MODAL -->
		<div class="modal" id="product-modal">
			<div class="modal__overlay"></div>
			<div class="modal__window">
				<button class="modal__close">✕</button>
				<div class="modal__body"></div>
			</div>
		</div>

		<!-- SCRIPTS	 -->

		<script type="module" src="./js/index/pages/home.js"></script>
	</body>
</html>
